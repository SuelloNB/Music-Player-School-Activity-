<html lang="en">
<head>

    <title>My Favorite Music</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header class="header">
        <h1>My Favorite Music</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="music.html" id="favorites-btn">My Favorites</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>

    <main class="pcontainer">
        <section class="lyricsContainer">
            <div id="lyrics"></div>

        <section class="player">
            <img id="album-cover" src="" alt="Album Cover">

            <div class="controls">
                <button id="prev-btn">Previous</button>
                <button id="play-btn">Play</button>
                <button id="next-btn">Next</button>
            </div>
            
            <div class="player-beats" id="player-beats">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </section>

    <script src="../script/script.js"></script>
